<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schoolboy: Bottom Joystick</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.8); padding: 8px; border: 2px solid #0f0; border-radius: 5px; z-index: 100; font-size: 12px; pointer-events: none; }
        
        #mobile-ui { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 500; display: none; }
        .t-btn { pointer-events: auto; position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 10px; }
        
        /* ДЖОЙСТИК В САМОМ НИЗУ */
        #joy-base { left: 20px; bottom: 20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #fff; border-radius: 50%; }
        
        #btn-e { right: 15px; bottom: 15px; background: rgba(0,255,0,0.3); }
        #btn-jump { right: 15px; bottom: 85px; }

        #punish, #win, #death { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: #fff; border: 4px solid #000; padding: 15px; text-align: center; z-index: 1000; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="ui">Ключ: <span id="inv">НЕТ</span> | <span id="st-txt">ТИХО</span></div>

    <div id="mobile-ui">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div id="btn-e" class="t-btn">ДЕЙСТВИЕ</div>
        <div id="btn-jump" class="t-btn">ПРЫЖОК</div>
    </div>

    <div id="win"><h1>ПОБЕДА!</h1><button onclick="location.reload()">ЗАНОВО</button></div>
    <div id="death"><h1>ПОЙМАН!</h1><button onclick="location.reload()">ЕЩЕ РАЗ</button></div>
    <div id="punish"><h2>НАКАЗАНИЕ</h2><p>Мой пол!</p><h3><span id="cp">0</span>%</h3></div>

    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) document.getElementById('mobile-ui').style.display = 'block';

    const map = [
      ,
      ,
      ,
      ,
      ,
    ];

    let doorOpen = 0, targetDoor = 0, hasKey = false, isOver = false, isPunish = false, clean = 0;
    const player = { x: 1.5, y: 1.5, dir: 0, vLook: 0, z: 0, vVel: 0 };
    const enemy = { x: 8.5, y: 4.5, state: 'COOKING' };
    const keys = {};
    
    let joy = { active: false, x: 0, y: 0, id: null };
    let look = { active: false, lastX: 0, lastY: 0, id: null };

    // ПК Ввод
    canvas.addEventListener('click', () => { if (!isOver && !('ontouchstart' in window)) canvas.requestPointerLock(); });
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === canvas) {
            player.dir += e.movementX * 0.003;
            player.vLook = Math.max(-H/2, Math.min(H/2, player.vLook - e.movementY * 2));
        }
    });

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'KeyE') interact();
        if(e.code === 'Space' && player.z === 0) player.vVel = 0.15;
    };
    window.onkeyup = e => keys[e.code] = false;

    // Телефон Ввод
    canvas.addEventListener('touchstart', e => {
        for (let t of e.changedTouches) {
            if (t.clientX > W/2) {
                look.active = true; look.id = t.identifier;
                look.lastX = t.clientX; look.lastY = t.clientY;
            }
        }
    }, {passive: false});

    const jBase = document.getElementById('joy-base');
    jBase.addEventListener('touchstart', e => {
        joy.active = true; joy.id = e.targetTouches.identifier;
    }, {passive: false});

    document.addEventListener('touchmove', e => {
        for (let t of e.touches) {
            if (joy.active && t.identifier === joy.id) {
                let r = jBase.getBoundingClientRect();
                let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
                let d = Math.min(40, Math.sqrt(dx*dx + dy*dy));
                let a = Math.atan2(dy, dx);
                joy.x = Math.cos(a) * (d/40); joy.y = Math.sin(a) * (d/40);
                document.getElementById('joy-stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            }
            if (look.active && t.identifier === look.id) {
                player.dir += (t.clientX - look.lastX) * 0.006;
                player.vLook = Math.max(-H/2, Math.min(H/2, player.vLook - (t.clientY - look.lastY) * 2.5));
                look.lastX = t.clientX; look.lastY = t.clientY;
            }
        }
    }, {passive: false});

    document.addEventListener('touchend', e => {
        for (let t of e.changedTouches) {
            if (t.identifier === joy.id) { joy.active = false; joy.x = joy.y = 0; document.getElementById('joy-stick').style.transform = ''; }
            if (t.identifier === look.id) look.active = false;
        }
    });

    document.getElementById('btn-e').ontouchstart = (e) => { e.preventDefault(); interact(); };
    document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); if(player.z === 0) player.vVel = 0.15; };

    function interact() {
        let tx = Math.floor(player.x + Math.cos(player.dir)*1.1), ty = Math.floor(player.y + Math.sin(player.dir)*1.1);
        if(map[ty] && map[ty][tx] === 2) targetDoor = targetDoor ? 0 : 1;
        if(map[ty] && map[ty][tx] === 7) { hasKey = true; map[ty][tx] = 0; document.getElementById('inv').innerText = "ЕСТЬ"; }
    }

    function render() {
        if(isOver) return;
        const horizon = H/2 + player.vLook + player.z * 100;
        ctx.fillStyle = '#222'; ctx.fillRect(0, 0, W, horizon);
        ctx.fillStyle = '#444'; ctx.fillRect(0, horizon, W, H - horizon);
        doorOpen += (targetDoor - doorOpen) * 0.1;
        let zB = new Array(W).fill(20);

        for (let i = 0; i < W; i += 4) {
            let angle = player.dir - 0.6 + (i / W) * 1.2;
            let dist = 0, hit = 0, type = 0, dx = Math.cos(angle), dy = Math.sin(angle);
            while (dist < 15 && hit === 0) {
                dist += 0.1;
                let tx = Math.floor(player.x + dx * dist), ty = Math.floor(player.y + dy * dist);
                if (map[ty] && map[ty][tx] > 0) {
                    if (map[ty][tx] === 2 && doorOpen > 0.8) continue;
                    hit = 1; type = map[ty][tx];
                }
            }
            let cD = dist * Math.cos(angle - player.dir); zB[i] = cD;
            let wH = H / cD;
            ctx.fillStyle = type === 2 ? '#740' : (type === 3 ? '#00f' : (type === 7 ? 'gold' : (type === 8 ? '#fff' : '#888')));
            ctx.fillRect(i, horizon - wH/2, 4, wH);
        }
        
        let edx = enemy.x - player.x, edy = enemy.y - player.y, eD = Math.sqrt(edx*edx+edy*edy);
        let eA = Math.atan2(edy, edx) - player.dir;
        while(eA < -Math.PI) eA += Math.PI*2; while(eA > Math.PI) eA -= Math.PI*2;
        if (Math.abs(eA) < 0.8 && eD < zB[Math.floor((eA + 0.6) / 1.2 * W)]) {
            let ew = H / eD;
            ctx.fillStyle = enemy.state === 'CHASING' ? 'red' : 'lime';
            ctx.fillRect(((eA + 0.6) / 1.2 * W) - ew/4, horizon - ew/2, ew/2, ew);
        }
    }

    function update() {
        if(isOver) return;
        let cellType = map[Math.floor(player.y)][Math.floor(player.x)];
        let onBed = (cellType === 3);

        if(isPunish) {
            document.getElementById('cp').innerText = Math.floor(clean += 0.5);
            if(clean >= 100) { isPunish = false; clean = 0; player.x = 1.5; player.y = 1.5; document.getElementById('punish').style.display = 'none'; }
            render(); requestAnimationFrame(update); return;
        }

        player.z += player.vVel;
        if (player.z > 0) player.vVel -= 0.01; else { player.z = 0; player.vVel = 0; }

        let s = 0.075, mx = 0, my = 0;
        if(keys['KeyW']) { mx += Math.cos(player.dir)*s; my += Math.sin(player.dir)*s; }
        if(keys['KeyS']) { mx -= Math.cos(player.dir)*s; my -= Math.sin(player.dir)*s; }
        if(joy.active) { mx += (Math.cos(player.dir)*-joy.y + Math.sin(player.dir)*joy.x)*s; my += (Math.sin(player.dir)*-joy.y - Math.cos(player.dir)*joy.x)*s; }
        
        if (map[Math.floor(player.y + my)][Math.floor(player.x + mx)] !== 1) { player.x += mx; player.y += my; }
        if (cellType === 8 && hasKey) { isOver = true; document.getElementById('win').style.display = 'block'; }
        
        let dTP = Math.sqrt((player.x-enemy.x)**2 + (player.y-enemy.y)**2);
        if (dTP < 4 && !onBed) enemy.state = 'CHASING';
        else if (onBed) enemy.state = 'COOKING';

        if (enemy.state === 'CHASING') {
            let a = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            enemy.x += Math.cos(a)*0.055; enemy.y += Math.sin(a)*0.055;
            if (dTP < 0.4) { isPunish = true; enemy.state = 'COOKING'; document.getElementById('punish').style.display = 'block'; }
        }
        document.getElementById('st-txt').innerText = onBed ? "БЕЗОПАСНО" : (enemy.state === 'CHASING' ? "ПОГОНЯ!" : "ТИХО");
        render(); requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
